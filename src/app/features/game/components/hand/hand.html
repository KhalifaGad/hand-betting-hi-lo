<div class="hand-label">Your hand</div>
<div class="cards" [style.--n]="display().length">
  @for (tile of display(); track tile) {
    <app-mahjong-tile
      [tile]="tile"
      [size]="118"
      [class.leaving]="phase() === 'leaving'"
      [class.entering]="phase() === 'entering'"
      [class.win]="phase() === 'entering' && flash() === 'win'"
      [class.lose]="phase() === 'entering' && flash() === 'lose'"
      [style.animationDelay]="delay($index)"
    />
  }
</div>
<div class="total">
  <span>Total</span>
  <b class="mono" [appCountPop]="displayTotal()">{{ displayTotal() }}</b>
</div>
