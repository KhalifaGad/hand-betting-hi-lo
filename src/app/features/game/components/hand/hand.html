<div class="hand-label">Your hand</div>
<div class="cards">
  @for (tile of tiles(); track $index) {
    <app-mahjong-tile
      [tile]="tile"
      [size]="118"
      [class.dealing]="phase() === 'entrance'"
      [class.leaving]="phase() === 'leaving'"
      [class.dealin]="phase() === 'dealing'"
      [class.flash-win]="flashClass() === 'flash-win'"
      [class.flash-lose]="flashClass() === 'flash-lose'"
      [style.animationDelay]="delay($index)"
    />
  }
</div>
<div class="total">
  <span>Total</span>
  <b class="mono">{{ total() }}</b>
</div>
